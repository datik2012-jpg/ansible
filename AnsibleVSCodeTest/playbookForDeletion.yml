- name: Install Apache webserver and deploy index html
  hosts: webservers
  become: true
  tasks:
    - name: Install Apache webserver
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Ensure Apache service is running
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Deploy custom index.html
      copy:
        dest: /var/www/html/index.html
        content: "<html><body><h1>Welcome to Apache</h1></body></html>"
        owner: www-data
        group: www-data
        mode: '0644'
